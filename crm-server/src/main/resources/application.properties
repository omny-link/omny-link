spring.jpa.open-in-view = false
spring.jackson.mapper.default-view-inclusion=true

spring.threads.virtual.enabled=true

# Springdoc OpenAPI configuration
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
# Disable Data REST integration until Springdoc fully supports Spring Boot 4.0
# spring.autoconfigure.exclude=org.springdoc.core.configuration.SpringDocDataRestConfiguration

spring.liquibase.enabled=false
spring.liquibase.change-log=classpath:liquibase-changelog.xml

# Keycloak OAuth2 Resource Server Configuration
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://auth.knowprocess.com/auth/realms/knowprocess
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://auth.knowprocess.com/auth/realms/knowprocess/protocol/openid-connect/certs

# JWT Authentication Converter Settings
jwt.auth.converter.resource-id=crm
jwt.auth.converter.principal-attribute=preferred_username
